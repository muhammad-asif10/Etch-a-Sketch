<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Painter</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top-bar">
    <h1>Pixel Painter</h1>
  </header>

  <section class="workspace">
    <aside class="tool-panel">
      <input type="color" id="paintColor" value="#1f1f1f" />

      <button id="paintMode">Paint</button>
      <button id="multiColorMode">Rainbow</button>
      <button id="removeMode">Erase</button>
      <button id="resetBoard">Reset Board</button>

      <p class="board-size" id="boardSize">20 × 20</p>

      <input
        type="range"
        id="boardSlider"
        min="4"
        max="64"
        value="20"
      />
    </aside>

    <div id="drawingBoard" class="drawing-board"></div>
  </section>

  <footer class="page-footer">
    <p>Created by <a href="https://github.com/muhammad-asif10">Muhammad Asif</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
